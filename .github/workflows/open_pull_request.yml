name: Open a PR to main

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  SOURCE_BRANCH: ${{ github.head_ref || github.ref_name }}
  MESSAGE: Merge branch `${{ github.head_ref || github.ref_name }}` to `main`

jobs:
  pull-request:
    name: Open pull request
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Open pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$SOURCE_BRANCH" = "main" ]; then
            echo "Skipping pull request creation from main to main."
            exit 0
          fi

          comparison_status="$(gh api \
            "repos/$GITHUB_REPOSITORY/compare/main...$SOURCE_BRANCH" \
            --jq '.status')"

          if [ "$comparison_status" = "identical" ] || [ "$comparison_status" = "behind" ]; then
            echo "Skipping pull request creation because $SOURCE_BRANCH is $comparison_status main."
            exit 0
          fi

          existing_pr="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$SOURCE_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$existing_pr" ]; then
            echo "Pull request #$existing_pr already exists."
            exit 0
          fi

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$SOURCE_BRANCH" \
            --title "chore: $MESSAGE" \
            --body "This pull request will $MESSAGE." \
            --draft
